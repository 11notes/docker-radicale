name: org.version
run-name: org.version ${{ inputs.version }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'set version for build'
        type: string
        required: true

jobs:
  # ╔═════════════════════════════════════════════════════╗
  # ║               BUILD VERSION {N} IMAGE               ║
  # ╚═════════════════════════════════════════════════════╝
  version:
    runs-on: ubuntu-latest
    steps:
      - name: setup config
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { Buffer } = require('node:buffer');
            const etc = {
              version:"${{ github.event.inputs.version }}",
              semver:{disable:{rolling:true}}
            };
            core.exportVariable('WORKFLOW_BASE64JSON', Buffer.from(JSON.stringify(etc)).toString('base64'));

      - name: build container image
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 #v1.3.2
        with:
          wait-for-completion: false
          workflow: org.container.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "release":"false", "readme":"false", "run-name":"org.container build ${{ github.event.inputs.version }}", "etc":"${{ env.WORKFLOW_BASE64JSON }}" }'